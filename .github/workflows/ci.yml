name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Upload example fixture diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: example-results-${{ matrix.os }}
          path: test-results/examples
          if-no-files-found: ignore

  hook-managers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm ci
      - run: python -m pip install lefthook==2.1.10 pre-commit==4.6.0
      - run: npm run test:hook-managers
